<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Sign Language Translator</title>

<style>
    body {
        margin: 0;
        padding: 0;
        font-family: Arial, sans-serif;
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;

        /* Gradient Background */
        background: linear-gradient(135deg, #667eea, #764ba2);
    }

    /* Glass Card */
    .container {
        backdrop-filter: blur(15px);
        background: rgba(255, 255, 255, 0.1);
        padding: 40px;
        border-radius: 20px;
        text-align: center;
        box-shadow: 0 20px 40px rgba(0,0,0,0.3);
        width: 350px;
    }

    h1 {
        color: white;
        margin-bottom: 20px;
    }

    /* 3D Button */
    .btn {
        display: block;
        margin: 15px auto;
        padding: 12px 20px;
        width: 220px;
        border: none;
        border-radius: 10px;
        font-size: 16px;
        cursor: pointer;
        color: white;
        background: linear-gradient(145deg, #ff7eb3, #ff758c);

        box-shadow: 0 8px 15px rgba(0,0,0,0.3);
        transition: all 0.3s ease;
    }

    .btn:hover {
        transform: translateY(-5px);
        box-shadow: 0 15px 25px rgba(0,0,0,0.4);
    }

    .btn:active {
        transform: translateY(2px);
        box-shadow: 0 5px 10px rgba(0,0,0,0.2);
    }

    /* Subtitle */
    p {
        color: #ddd;
        font-size: 14px;
    }
</style>

</head>

<body>

<div class="container">
    <h1>Sign Language Translator</h1>
    <p>Select your preferred version</p>

    <form action="/run" method="post">
        <button class="btn" name="mode" value="india">🇮🇳 Indian Version</button>
        <button class="btn" name="mode" value="us">🇺🇸 US Version</button>
    </form>
</div>

</body>
</html>
